name: Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 65002 -H 147.93.17.215 >> ~/.ssh/known_hosts

      - name: Deploy via rsync over SSH
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p 65002 -o StrictHostKeyChecking=no" \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.firebase' \
            --exclude='.claude' \
            --exclude='public' \
            --exclude='.gitignore' \
            --exclude='deploy_key' \
            --exclude='deploy_key.pub' \
            --exclude='dgloamingnest-deploy.zip' \
            --exclude='FIREBASE_DEPLOYMENT_GUIDE.md' \
            --exclude='DEPLOYMENT_CHECKLIST.md' \
            --exclude='CUSTOM_DOMAIN_SETUP.md' \
            --exclude='SEO_IMPLEMENTATION_REPORT.md' \
            --exclude='SEO_OPTIMIZATION_SUMMARY.md' \
            --exclude='SEO_QUICK_REFERENCE.md' \
            --exclude='README.md' \
            --exclude='generate-icons.js' \
            --exclude='google-apps-script.js' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='.github' \
            ./ u792884062@147.93.17.215:/home/u792884062/public_html/
